<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Analyzer</title>

<style>
body {
  font-family: Arial;
  background: #f0f4f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 420px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

textarea {
  width: 100%;
  height: 90px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #6c63ff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.mic-btn {
  background: #ff4d4d;
}

#transcript {
  margin-top: 10px;
  font-size: 13px;
  color: #555;
}

#result {
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>Mental Health Analyzer</h2>

  <textarea id="userText" placeholder="Type or use mic..."></textarea>

  <button onclick="startMic()" class="mic-btn">🎤 Start Mic</button>

  <div id="transcript"></div>

  <button onclick="analyze()">Analyze</button>

  <div id="result">
    <p><b>Emotion:</b> <span id="emotion"></span></p>
    <p><b>Confidence:</b> <span id="confidence"></span></p>
    <p><b>Suggestion:</b> <span id="suggestion"></span></p>
  </div>
</div>

<script>
let recognition;
let isListening = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech recognition not supported. Use Chrome.");
    return null;
  }

  const recog = new SpeechRecognition();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = "en-US";

  recog.onresult = (event) => {
    let transcript = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }

    document.getElementById("transcript").textContent = transcript;
    document.getElementById("userText").value = transcript;
  };

  recog.onerror = () => stopMic();

  return recog;
}

function startMic() {
  if (!recognition) recognition = initSpeech();
  if (!recognition) return;

  if (!isListening) {
    recognition.start();
    isListening = true;
    document.querySelector(".mic-btn").textContent = "⏹ Stop Mic";
  } else {
    stopMic();
  }
}

function stopMic() {
  if (recognition) recognition.stop();
  isListening = false;
  document.querySelector(".mic-btn").textContent = "🎤 Start Mic";
}

async function analyze() {
  const text = document.getElementById("userText").value.trim();

  if (!text) {
    alert("Please enter or speak something");
    return;
  }

  const res = await fetch("/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  document.getElementById("emotion").textContent = data.emotion;
  document.getElementById("confidence").textContent = data.confidence + "%";
  document.getElementById("suggestion").textContent = data.suggestion;

  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
